version: '3'
services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - ./docker-entrypoint.sh:/docker-entrypoint.sh
      - ./import.sql:/import.sql
  node:
    build:
      context: .
      dosckerfile: Dockerfile
    restart: always
    environment:
      DB_PASSWORD_FILE: ${DB_PASSWORD}
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
    ports:
      - "8080:8080"